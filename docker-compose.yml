services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/data/ecommerce.db
      - PORT=8080
      - AUTO_SEED=true
    volumes:
      - sqlite-data:/app/data

volumes:
  sqlite-data:
